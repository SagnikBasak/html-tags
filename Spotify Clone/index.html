<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>
    <div class="container flex">
        <div class="left">
            <div class="left-top left-common">
                <img src="assets/img/logo.svg" alt="logo">
                <div class="home-search">
                    <ul>
                        <li><img src="assets/img/home.svg" alt="home">Home</li>
                        <li><img src="assets/img/search.svg" alt="search">Search</li>
                    </ul>
                </div>
            </div>
            <div class="left-bottom left-common">
                <div class="heading">
                    <img src="assets/img/library.svg" alt="library">
                    <h3>Your library</h3>
                    <img class="plus-svg" src="assets/img/plus.svg" alt="plus">
                </div>
                <div class="scrollable">
                    <div class="scrollable-left">
                        <h3>Create your first playlist</h3>
                        <h4>It's easy, we'll help you</h4>
                        <button>Create playlist</button>
                    </div>
                    <div class="scrollable-left">
                        <h4>Let's find some podcasts to follow</h4>
                        <h5>We'll keep you updated on new episodes</h5>
                        <button>Browse podcasts</button>
                    </div>
                </div>
                <footer>
                    <a href="#">Legal</a>
                    <a href="#">Safety & Privacy Center</a>
                    <a href="#">Privacy Policy</a>
                    <a href="#">Cookies</a>
                    <a href="#">About Ads</a>
                    <a href="#">Accessibility</a>
                </footer>
                <div class="lang">
                    <img src="assets/img/lang.svg" alt="lang">
                    <button>English</button>
                </div>
            </div>
        </div>
        <div class="right">
            
        </div>
    </div>
</body>

</html>
